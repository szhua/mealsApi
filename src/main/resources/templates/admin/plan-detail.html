<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规划详情 - 三餐记食后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: #1890ff; color: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .header h1 { font-size: 24px; }
        .header a { color: white; }
        .header .meta { margin-top: 10px; font-size: 14px; opacity: 0.9; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h2 { font-size: 18px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: top; }
        th { background: #fafafa; font-weight: 600; position: sticky; top: 0; }
        .meal-cell { max-width: 200px; }
        .dish-item { display: inline-block; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; margin: 2px; font-size: 12px; }
        .date-cell { font-weight: 500; white-space: nowrap; }
        .nutrient { font-size: 12px; color: #666; }
        .nutrient span { margin-right: 10px; }
        .nutrient .calories { color: #f5222d; font-weight: 600; }
        .today { background: #e6f7ff; }
        .stats-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 8px; padding: 15px 20px; flex: 1; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-card .label { color: #666; font-size: 14px; }
        .stat-card .value { font-size: 24px; font-weight: 600; color: #1890ff; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>规划详情</h1>
            <div class="meta">
                <span th:text="${plan.startDate + ' ~ ' + plan.endDate}"></span> |
                <span>用户: <a th:href="@{/admin/users/{id}(id=${user.id})}" th:text="${user.nickname ?: user.id}"></a></span>
            </div>
            <p style="margin-top: 10px;"><a href="javascript:history.back()">← 返回</a></p>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="label">总天数</div>
                <div class="value" th:text="${#lists.size(daySummaries)}"></div>
            </div>
            <div class="stat-card">
                <div class="label">每周重置</div>
                <div class="value" th:text="${plan.weeklyReset ? '是' : '否'}"></div>
            </div>
            <div class="stat-card">
                <div class="label">创建时间</div>
                <div class="value" style="font-size: 16px;" th:text="${#temporals.format(plan.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
            </div>
        </div>

        <div class="card">
            <h2>每日安排</h2>
            <table>
                <thead>
                    <tr>
                        <th style="width: 120px;">日期</th>
                        <th class="meal-cell">早餐</th>
                        <th class="meal-cell">午餐</th>
                        <th class="meal-cell">晚餐</th>
                        <th style="width: 200px;">营养统计</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="day : ${daySummaries}" th:class="${day.date == #temporals.createToday() ? 'today' : ''}">
                        <td class="date-cell">
                            <span th:text="${#temporals.format(day.date, 'MM-dd')}"></span>
                            <span th:if="${day.date == #temporals.createToday()}" style="color: #1890ff; font-size: 12px;"> 今天</span>
                        </td>
                        <td class="meal-cell">
                            <span th:each="name : ${day.breakfastDishes}" class="dish-item" th:text="${name}"></span>
                            <span th:if="${#lists.isEmpty(day.breakfastDishes)}" style="color: #999;">-</span>
                        </td>
                        <td class="meal-cell">
                            <span th:each="name : ${day.lunchDishes}" class="dish-item" th:text="${name}"></span>
                            <span th:if="${#lists.isEmpty(day.lunchDishes)}" style="color: #999;">-</span>
                        </td>
                        <td class="meal-cell">
                            <span th:each="name : ${day.dinnerDishes}" class="dish-item" th:text="${name}"></span>
                            <span th:if="${#lists.isEmpty(day.dinnerDishes)}" style="color: #999;">-</span>
                        </td>
                        <td class="nutrient">
                            <span class="calories" th:text="${day.calories + ' kcal'}"></span>
                            <span th:text="${'蛋白质 ' + day.protein + 'g'}"></span>
                            <span th:text="${'碳水 ' + day.carbs + 'g'}"></span>
                            <span th:text="${'脂肪 ' + day.fat + 'g'}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(daySummaries)}">
                        <td colspan="5" style="text-align: center; color: #999;">暂无数据</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
