<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户详情 - 三餐记食后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: #1890ff; color: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .header h1 { font-size: 24px; }
        .header a { color: white; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h2 { font-size: 18px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .user-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .info-item { }
        .info-item .label { color: #666; font-size: 14px; }
        .info-item .value { font-size: 16px; margin-top: 5px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #fafafa; font-weight: 600; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin: 2px; }
        .tag-breakfast { background: #fff7e6; color: #d46b08; }
        .tag-lunch { background: #e6f7ff; color: #0958d9; }
        .tag-dinner { background: #f9f0ff; color: #722ed1; }
        .dish-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .dish-img-placeholder { width: 60px; height: 60px; border-radius: 8px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: #999; font-size: 12px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>用户详情</h1>
            <p><a href="/admin/users">← 返回用户列表</a></p>
        </div>

        <div class="card">
            <h2>基本信息</h2>
            <div class="user-info">
                <div class="info-item">
                    <div class="label">头像</div>
                    <img th:if="${user.avatar}" th:src="${user.avatar}" class="avatar">
                    <div th:unless="${user.avatar}" style="width:80px;height:80px;background:#eee;border-radius:50%;"></div>
                </div>
                <div class="info-item">
                    <div class="label">ID</div>
                    <div class="value" th:text="${user.id}"></div>
                </div>
                <div class="info-item">
                    <div class="label">OpenID</div>
                    <div class="value" th:text="${user.openId}"></div>
                </div>
                <div class="info-item">
                    <div class="label">手机号</div>
                    <div class="value" th:text="${user.phone ?: '未绑定'}"></div>
                </div>
                <div class="info-item">
                    <div class="label">昵称</div>
                    <div class="value" th:text="${user.nickname ?: '未设置'}"></div>
                </div>
                <div class="info-item">
                    <div class="label">注册时间</div>
                    <div class="value" th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></div>
                </div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <h2>菜品列表 (<span th:text="${#lists.size(dishes)}"></span>)</h2>
                <table>
                    <thead>
                        <tr>
                            <th>图片</th>
                            <th>名称</th>
                            <th>热量</th>
                            <th>餐次</th>
                            <th>创建时间</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="dish : ${dishes}">
                            <td>
                                <img th:if="${dish.image}" th:src="${dish.image}" class="dish-img">
                                <div th:unless="${dish.image}" class="dish-img-placeholder">无图</div>
                            </td>
                            <td th:text="${dish.name}"></td>
                            <td th:text="${dish.calories + ' kcal'}"></td>
                            <td>
                                <span th:each="type : ${#strings.listSplit(dish.mealTypes, ',')}"
                                      th:class="${'tag tag-' + type}" th:text="${type}"></span>
                            </td>
                            <td th:text="${#temporals.format(dish.createdAt, 'yyyy-MM-dd')}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(dishes)}">
                            <td colspan="5" style="text-align: center; color: #999;">暂无菜品</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h2>饮食规划 (<span th:text="${#lists.size(plans)}"></span>)</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>开始日期</th>
                            <th>结束日期</th>
                            <th>每周重置</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="plan : ${plans}">
                            <td th:text="${plan.id}"></td>
                            <td th:text="${plan.startDate}"></td>
                            <td th:text="${plan.endDate}"></td>
                            <td th:text="${plan.weeklyReset ? '是' : '否'}"></td>
                            <td><a th:href="@{/admin/plans/{id}(id=${plan.id})}" style="color: #1890ff;">查看详情</a></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(plans)}">
                            <td colspan="5" style="text-align: center; color: #999;">暂无规划</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>打卡记录 (最近30天)</h2>
            <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                <span th:each="checkIn : ${checkIns}"
                      style="padding: 4px 10px; background: #e6f7ff; border-radius: 4px; font-size: 13px;"
                      th:text="${checkIn.checkDate}"></span>
                <span th:if="${#lists.isEmpty(checkIns)}" style="color: #999;">暂无打卡记录</span>
            </div>
        </div>
    </div>
</body>
</html>
